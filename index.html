<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TERAMAS-CC てらますしーしー</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1 id="main-header">WebAssembly 放射線計測デモ</h1>
            <div class="controls-top">
                <button id="lang-button" class="btn btn-secondary">English / 日本語</button>
            </div>

            <div class="camera-selection">
                <select id="camera-select" disabled></select>
                <button id="connect-camera-button" class="btn btn-primary">カメラ接続開始</button>
            </div>
            
            <div class="status-box">
                <p id="status-message" class="status-initial-ready">カメラ接続を待機しています。</p>
                <p class="status-hint" id="status-hint-lang">English version is available. Click the English / 日本語 button around left-top to switch.</p>
            </div>
        </header>

        <main class="main-content">
            <div class="display-area">
                <video id="camera-feed" playsinline autoplay muted></video>
                <canvas id="display-canvas" style="display: none;"></canvas>
            </div>
            
            <div class="right-panel">
                <div class="measurement-controls">
                    <button id="preliminary-button" class="btn btn-action" disabled>予備測定（調整）</button>
                    <button id="start-button" class="btn btn-primary" disabled>計測開始</button>
                    <button id="reset-button" class="btn btn-secondary" disabled>初期化・リセット</button>
                </div>

                <div class="view-mode-selector">
                    <h3>表示モード</h3>
                    <div class="radio-group">
                        <input type="radio" id="mode-live" name="view-mode" value="REALTIME" checked>
                        <label for="mode-live" id="mode-live-label">カメラ生画像</label><br>

                        <input type="radio" id="mode-grayscale" name="view-mode" value="GRAYSCALE">
                        <label for="mode-grayscale" id="mode-grayscale-label">グレースケール積算画像</label><br>
                        
                        <input type="radio" id="mode-color" name="view-mode" value="COLOR">
                        <label for="mode-color" id="mode-color-label">カラー積算画像 (未実装)</label>
                    </div>
                </div>

                <div class="statistics">
                    <h2>統計情報</h2>
                    <p><span id="frame-label">処理済みフレーム数:</span> <span id="frame-count">0</span></p>
                    <p><span id="event-label">総イベント数:</span> <span id="event-count">0</span></p>
                    <p><span id="rate-label">計数率:</span> <span id="rate-value">0.000 Hz</span></p>
                </div>

                <div class="calibration-info">
                    <h2 id="header-calib">キャリブレーション状況 (ノイズ割合)</h2>
                    <p><span id="factor-gr-label">G/R係数:</span> <span id="factor-gr-value">1.000</span></p>
                    <p><span id="factor-br-label">B/R係数:</span> <span id="factor-br-value">1.000</span></p>
                </div>
                
                <div class="utility-controls">
                    <p class="status-hint">計測安定性の情報がここに入ります。</p>
                    <button id="dedicated-window-button" class="btn btn-secondary">単独ウィンドウで開きなおす</button>
                </div>
            </div>
        </main>
    </div>

    <script src="teramas-cc.js"></script>
</body>
</html>
